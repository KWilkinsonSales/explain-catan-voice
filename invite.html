<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Create Explain Mission</title>
  <style>
    :root{--bg:#0b1320;--panel:#131f31;--text:#f5f1e8;--muted:#a8b5c8;--gold:#f1bd6c;--line:rgba(255,255,255,.1)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#0b1320,#111c2d);color:var(--text);padding:24px}.wrap{max-width:560px;margin:0 auto}.card{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:24px;padding:22px}h1{font-family:Georgia,serif;margin:0 0 8px}.sub{color:var(--muted);line-height:1.5;margin-bottom:20px}.grid{display:grid;gap:14px}label{display:grid;gap:7px;font-size:13px;color:var(--muted)}input,textarea{width:100%;border:1px solid var(--line);background:#0f1a2a;color:var(--text);border-radius:14px;padding:13px 14px;font:inherit}textarea{min-height:90px;resize:vertical}button{width:100%;border:0;border-radius:16px;padding:15px;background:linear-gradient(135deg,#ffd891,var(--gold));font-weight:800;color:#1b2430;cursor:pointer}.result{display:none;margin-top:18px;padding:16px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035)}.result.active{display:block}.url{word-break:break-all;color:#dfe8f5;font-size:13px;line-height:1.5}.mini{color:var(--muted);font-size:12px;margin-top:10px}.row{display:flex;gap:10px;margin-top:12px}.row button{flex:1;background:#21364f;color:var(--text)}.error{display:none;margin-top:14px;color:#ffd0c7;font-size:13px}.error.active{display:block}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Create an Explain Mission</h1>
      <p class="sub">Generate a recipient-specific invitation. Each link resolves through the live Explain Runtime into one temporary room with one bounded Mission.</p>
      <div class="grid">
        <label>Recipient name<input id="recipient" placeholder="Scott" /></label>
        <label>Role or context<input id="role" placeholder="Attorney, operator, investor..." /></label>
        <label>Topic<input id="topic" value="Explain ADL" /></label>
        <label>Approved context<textarea id="context" placeholder="Only include context Kellen has approved for this explanation."></textarea></label>
        <button id="createBtn">Create invitation</button>
      </div>
      <div id="error" class="error"></div>
      <div id="result" class="result">
        <strong>Invitation ready</strong>
        <div id="url" class="url"></div>
        <div class="row"><button id="copyBtn">Copy link</button><button id="openBtn">Open room</button></div>
        <div class="mini">Cross-device Mission metadata now resolves from the live Explain Runtime. No transcript is stored by default.</div>
      </div>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    let created;
    const createBtn=document.getElementById('createBtn');
    createBtn.onclick=async()=>{
      const error=document.getElementById('error');
      error.classList.remove('active');
      createBtn.disabled=true;
      createBtn.textContent='Creating…';
      try{
        created=await ExplainAPI.createInvite({
          issuerId:'kellen',
          issuerDisplayName:'Kellen Wilkinson',
          recipientDisplayName:document.getElementById('recipient').value.trim()||null,
          roleOrContext:document.getElementById('role').value.trim()||null,
          topic:document.getElementById('topic').value.trim()||'Explain ADL',
          approvedPersonalizationContext:{notes:document.getElementById('context').value.trim()}
        });
        const roomUrl=new URL('index.html',location.href);
        roomUrl.searchParams.set('i',created.token);
        document.getElementById('url').textContent=roomUrl.href;
        document.getElementById('result').classList.add('active');
      }catch(err){
        error.textContent=`Could not create invitation: ${err.message}`;
        error.classList.add('active');
      }finally{
        createBtn.disabled=false;
        createBtn.textContent='Create invitation';
      }
    };
    document.getElementById('copyBtn').onclick=async()=>{await navigator.clipboard.writeText(document.getElementById('url').textContent)};
    document.getElementById('openBtn').onclick=()=>location.href=document.getElementById('url').textContent;
  </script>
</body>
</html>
